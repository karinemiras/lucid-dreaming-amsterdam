  <body class="form-page">
    <div class="page-shell">
      <header class="site-header">
        <a class="brand brand-header" href="index.html#top">
          <span><span class="brand-highlight">Lucid</span> Dreaming in Amsterdam</span>
        </a>
        <div class="header-centerpiece">
          <img
            src="figures/astral-projection-floating-illustration.png"
            alt="Floating illustration evoking out-of-body experience and astral projection"
          />
        </div>
        <nav class="nav-links">
          <a href="index.html#top">Home</a>
          <a href="index.html#about-me">About Me</a>
          <a href="index.html#workshops">Workshops</a>
          <a href="index.html#coaching">Coaching</a>
          <a href="index.html#faq">FAQ</a>
          <a href="contact.html?type=contact">Contact</a>
        </nav>
      </header>

      <main>
        <section class="section form-section">
          <div class="form-intro">
            <p class="section-kicker" id="form-kicker">Contact</p>
            <h1 id="form-title">Connect with Karine</h1>
            <p id="form-subtitle">Send your note and I will get back to you.</p>
          </div>

          <form class="contact-form" action="/api/contact" method="POST">
            <input type="hidden" name="inquiry_type" id="inquiry-type" value="contact" />
            <input type="hidden" name="reply_context" id="reply-context" value="general_contact" />
            <label class="form-honeypot">
              Website
              <input type="text" name="website" autocomplete="off" tabindex="-1" />
            </label>

            <label class="form-field">
              <span>Name</span>
              <input type="text" name="name" autocomplete="name" required />
            </label>

            <label class="form-field">
              <span>Email</span>
              <input type="email" name="email" autocomplete="email" required />
            </label>

            <label class="form-field form-field-message">
              <span>Message</span>
              <textarea name="message" id="message" rows="8" required></textarea>
            </label>

            <div class="form-actions">
              <button class="button button-primary" type="submit" id="submit-button">Send Message</button>
              <a class="button button-secondary" href="index.html#top">Back Home</a>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script>
      const formCopy = {
        workshop: {
          kicker: "Workshops",
          title: "Join Workshop Waiting List",
          subtitle: "Send your details and receive a confirmation for the waiting list.",
          inquiryType: "workshop",
          replyContext: "workshop_waiting_list",
          button: "Join Waiting List",
          message:
            "Hello Karine,\n\nI would love to join the Lucid Dreaming Workshop Waiting List. Please keep me updated about future workshop dates and availability.\n\nThank you,"
        },
        coaching: {
          kicker: "Coaching",
          title: "Book Coaching",
          subtitle: "Send your details and receive a confirmation about coaching availability.",
          inquiryType: "coaching",
          replyContext: "coaching_availability",
          button: "Book Coaching",
          message:
            "Hello Karine,\n\nI am interested in lucid dreaming coaching and would love to learn more about working with you. Please let me know about availability, format, and next steps.\n\nThank you,"
        },
        contact: {
          kicker: "Contact",
          title: "Connect with Karine",
          subtitle: "Send your note and I will get back to you.",
          inquiryType: "contact",
          replyContext: "general_contact",
          button: "Send Message",
          message:
            "Hello Karine,\n\nI would love to connect about lucid dreaming, astral projection, or out-of-body experiences.\n\nThank you,"
        }
      };

      const params = new URLSearchParams(window.location.search);
      const selectedType = params.get("type");
      const copy = formCopy[selectedType] || formCopy.contact;

      document.getElementById("form-kicker").textContent = copy.kicker;
      document.getElementById("form-title").textContent = copy.title;
      document.getElementById("form-subtitle").textContent = copy.subtitle;
      document.getElementById("inquiry-type").value = copy.inquiryType;
      document.getElementById("reply-context").value = copy.replyContext;
      document.getElementById("submit-button").textContent = copy.button;
      document.getElementById("message").value = copy.message;
    </script>
  </body>
